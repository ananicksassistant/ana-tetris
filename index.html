<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ana Tetris - Leaderboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            padding: 10px;
            overflow-x: hidden;
        }
        
        h1 {
            margin: 10px 0;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.8);
            font-size: 2em;
        }
        
        .game-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            width: 100%;
            max-width: 500px;
        }
        
        @media (min-width: 600px) {
            .game-container {
                flex-direction: row;
                align-items: flex-start;
            }
        }
        
        canvas {
            border: 4px solid #e94560;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.5);
            background: #0a0a0a;
            max-width: 100%;
            height: auto;
        }
        
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }
        
        @media (min-width: 600px) {
            .sidebar {
                width: auto;
                min-width: 200px;
            }
        }
        
        .info-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid rgba(233, 69, 96, 0.3);
        }
        
        .info-box h3 {
            margin-bottom: 5px;
            color: #e94560;
            font-size: 0.9em;
        }
        
        .info-box p {
            font-size: 1.3em;
            font-weight: bold;
        }
        
        .stats-row {
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }
        
        .stats-row .info-box {
            flex: 1;
            text-align: center;
        }
        
        /* Leaderboard Styles */
        .leaderboard {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid rgba(233, 69, 96, 0.3);
            max-height: 250px;
            overflow-y: auto;
        }
        
        .leaderboard h3 {
            color: #e94560;
            margin-bottom: 10px;
            text-align: center;
            font-size: 1.1em;
        }
        
        .leaderboard-list {
            list-style: none;
        }
        
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.9em;
        }
        
        .leaderboard-item:last-child {
            border-bottom: none;
        }
        
        .leaderboard-item.top-1 {
            background: linear-gradient(90deg, rgba(255,215,0,0.2), transparent);
            border-left: 3px solid gold;
        }
        
        .leaderboard-item.top-2 {
            background: linear-gradient(90deg, rgba(192,192,192,0.2), transparent);
            border-left: 3px solid silver;
        }
        
        .leaderboard-item.top-3 {
            background: linear-gradient(90deg, rgba(205,127,50,0.2), transparent);
            border-left: 3px solid #cd7f32;
        }
        
        .leaderboard-rank {
            font-weight: bold;
            width: 30px;
            color: #e94560;
        }
        
        .leaderboard-name {
            flex: 1;
            text-align: left;
            padding-left: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .leaderboard-score {
            font-weight: bold;
            color: #00f0f0;
        }
        
        .leaderboard-empty {
            text-align: center;
            color: rgba(255,255,255,0.5);
            padding: 20px;
            font-size: 0.9em;
        }
        
        .controls-desktop {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid rgba(233, 69, 96, 0.3);
        }
        
        .controls-desktop h3 {
            margin-bottom: 10px;
            color: #e94560;
        }
        
        .controls-desktop p {
            margin: 5px 0;
            font-size: 0.85em;
        }
        
        @media (max-width: 599px) {
            .controls-desktop {
                display: none;
            }
        }
        
        .btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            touch-action: manipulation;
        }
        
        .btn:hover, .btn:active {
            background: #ff6b6b;
            transform: scale(1.05);
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-secondary {
            background: #2a2a4e;
            border: 2px solid #e94560;
        }
        
        .btn-secondary:hover {
            background: #3a3a6e;
        }
        
        /* Touch Controls for Mobile */
        .touch-controls {
            display: none;
            width: 100%;
            max-width: 350px;
            margin-top: 10px;
        }
        
        @media (max-width: 599px) {
            .touch-controls {
                display: block;
            }
        }
        
        .touch-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .touch-btn {
            background: linear-gradient(145deg, #2a2a4e, #1a1a2e);
            border: 2px solid #e94560;
            color: white;
            font-size: 1.5em;
            width: 70px;
            height: 70px;
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            touch-action: manipulation;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
            transition: all 0.1s;
        }
        
        .touch-btn:active {
            transform: scale(0.9);
            background: linear-gradient(145deg, #e94560, #ff6b6b);
            box-shadow: 0 2px 8px rgba(233, 69, 96, 0.5);
        }
        
        .touch-btn.wide {
            width: 150px;
            font-size: 1.2em;
        }
        
        .touch-btn.rotate-btn {
            background: linear-gradient(145deg, #4a1a4e, #3a0a3e);
            border-color: #a000f0;
        }
        
        .touch-btn.rotate-btn:active {
            background: linear-gradient(145deg, #a000f0, #c000ff);
        }
        
        .touch-btn.drop-btn {
            background: linear-gradient(145deg, #1a4e1a, #0a3e0a);
            border-color: #00f000;
        }
        
        .touch-btn.drop-btn:active {
            background: linear-gradient(145deg, #00f000, #00ff00);
        }
        
        .touch-btn.pause-btn {
            background: linear-gradient(145deg, #4e4e1a, #3e3e0a);
            border-color: #f0f000;
            font-size: 1.2em;
        }
        
        .touch-btn.pause-btn:active {
            background: linear-gradient(145deg, #f0f000, #ffff00);
            color: #1a1a2e;
        }
        
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border-radius: 15px;
            border: 3px solid #e94560;
            text-align: center;
            display: none;
            z-index: 100;
            width: 90%;
            max-width: 350px;
        }
        
        .game-over h2 {
            color: #e94560;
            margin-bottom: 15px;
            font-size: 2em;
        }
        
        .name-input-container {
            margin: 20px 0;
        }
        
        .name-input {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #e94560;
            color: white;
            padding: 12px 15px;
            font-size: 1.1em;
            border-radius: 8px;
            width: 100%;
            text-align: center;
            font-family: inherit;
            margin-bottom: 10px;
        }
        
        .name-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .name-input:focus {
            outline: none;
            border-color: #ff6b6b;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }
        
        .swipe-hint {
            display: none;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.8em;
            margin-top: 5px;
        }
        
        @media (max-width: 599px) {
            .swipe-hint {
                display: block;
            }
        }
    </style>
</head>
<body>
    <h1>🎮 ANA TETRIS</h1>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="300" height="600"></canvas>
        
        <div class="sidebar">
            <div class="stats-row">
                <div class="info-box">
                    <h3>Score</h3>
                    <p id="score">0</p>
                </div>
                <div class="info-box">
                    <h3>Level</h3>
                    <p id="level">1</p>
                </div>
                <div class="info-box">
                    <h3>Lines</h3>
                    <p id="lines">0</p>
                </div>
            </div>
            
            <!-- Leaderboard -->
            <div class="leaderboard">
                <h3>🏆 Leaderboard</h3>
                <ul class="leaderboard-list" id="leaderboardList">
                    <li class="leaderboard-empty">No scores yet!<br>Be the first to play!</li>
                </ul>
            </div>
            
            <div class="controls-desktop">
                <h3>Controls</h3>
                <p>⬅️ ➡️ = Move</p>
                <p>⬆️ = Rotate</p>
                <p>⬇️ = Soft Drop</p>
                <p>SPACE = Hard Drop</p>
                <p>P = Pause</p>
            </div>
            
            <button class="btn" onclick="startGame()" id="startBtn">New Game</button>
        </div>
    </div>
    
    <!-- Touch Controls for Mobile -->
    <div class="touch-controls">
        <div class="touch-row">
            <button class="touch-btn rotate-btn" data-action="rotate" title="Rotate">↻</button>
            <button class="touch-btn pause-btn" data-action="pause" title="Pause">⏸</button>
        </div>
        <div class="touch-row">
            <button class="touch-btn" data-action="left" title="Left">⬅️</button>
            <button class="touch-btn drop-btn" data-action="drop" title="Hard Drop">⬇️</button>
            <button class="touch-btn" data-action="right" title="Right">➡️</button>
        </div>
        <div class="touch-row">
            <button class="touch-btn wide" data-action="softdrop" title="Soft Drop">Soft Drop</button>
        </div>
        <p class="swipe-hint">💡 Tip: Swipe on the game to move</p>
    </div>
    
    <!-- Game Over Modal -->
    <div class="game-over" id="gameOver">
        <h2>GAME OVER</h2>
        <p>Score: <span id="finalScore">0</span></p>
        
        <div class="name-input-container" id="nameInputContainer">
            <p style="margin-bottom: 10px; color: #00f0f0;">🎉 New High Score!</p>
            <input type="text" class="name-input" id="playerName" placeholder="Enter your name" maxlength="15" autocomplete="off">
            <button class="btn" onclick="saveScore()">Save Score</button>
        </div>
        
        <div id="savedMessage" style="display: none; margin: 20px 0;">
            <p style="color: #00f000;">✅ Score saved!</p>
        </div>
        
        <button class="btn btn-secondary" onclick="startGame()" id="tryAgainBtn" style="margin-top: 10px;">Try Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;
        
        // Tetromino shapes
        const SHAPES = [
            [[1,1,1,1]], // I
            [[1,1],[1,1]], // O
            [[0,1,0],[1,1,1]], // T
            [[1,1,0],[0,1,1]], // S
            [[0,1,1],[1,1,0]], // Z
            [[1,0,0],[1,1,1]], // L
            [[0,0,1],[1,1,1]] // J
        ];
        
        const COLORS = [
            '#00f0f0', // I - Cyan
            '#f0f000', // O - Yellow
            '#a000f0', // T - Purple
            '#00f000', // S - Green
            '#f00000', // Z - Red
            '#f0a000', // L - Orange
            '#0000f0'  // J - Blue
        ];
        
        let board = [];
        let currentPiece = null;
        let score = 0;
        let level = 1;
        let lines = 0;
        let gameLoop = null;
        let gameOver = false;
        let paused = false;
        let isHighScore = false;
        
        // Touch handling variables
        let touchStartX = 0;
        let touchStartY = 0;
        let touchStartTime = 0;
        const SWIPE_THRESHOLD = 30;
        const TAP_THRESHOLD = 200;
        
        // Leaderboard
        const LEADERBOARD_KEY = 'tetris_leaderboard';
        const MAX_LEADERBOARD_ENTRIES = 10;
        
        class Piece {
            constructor(shape, color) {
                this.shape = shape;
                this.color = color;
                this.x = Math.floor(COLS / 2) - Math.floor(shape[0].length / 2);
                this.y = 0;
            }
            
            rotate() {
                const rotated = this.shape[0].map((_, i) =>
                    this.shape.map(row => row[row.length - 1 - i])
                );
                return rotated;
            }
        }
        
        function createBoard() {
            board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
        }
        
        function newPiece() {
            const type = Math.floor(Math.random() * SHAPES.length);
            currentPiece = new Piece(SHAPES[type], COLORS[type]);
            
            if (collision(currentPiece.shape, currentPiece.x, currentPiece.y)) {
                endGame();
            }
        }
        
        function endGame() {
            gameOver = true;
            clearInterval(gameLoop);
            
            // Check if it's a high score
            const leaderboard = getLeaderboard();
            isHighScore = leaderboard.length < MAX_LEADERBOARD_ENTRIES || score > leaderboard[leaderboard.length - 1].score;
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
            
            // Show/hide name input based on high score
            const nameInputContainer = document.getElementById('nameInputContainer');
            const savedMessage = document.getElementById('savedMessage');
            const tryAgainBtn = document.getElementById('tryAgainBtn');
            
            if (isHighScore && score > 0) {
                nameInputContainer.style.display = 'block';
                savedMessage.style.display = 'none';
                tryAgainBtn.textContent = 'Skip & Try Again';
                document.getElementById('playerName').value = '';
                document.getElementById('playerName').focus();
            } else {
                nameInputContainer.style.display = 'none';
                savedMessage.style.display = 'none';
                tryAgainBtn.textContent = 'Try Again';
            }
        }
        
        function collision(shape, x, y) {
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        const newX = x + c;
                        const newY = y + r;
                        
                        if (newX < 0 || newX >= COLS || newY >= ROWS) {
                            return true;
                        }
                        
                        if (newY >= 0 && board[newY][newX]) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }
        
        function mergePiece() {
            currentPiece.shape.forEach((row, r) => {
                row.forEach((cell, c) => {
                    if (cell) {
                        const y = currentPiece.y + r;
                        const x = currentPiece.x + c;
                        if (y >= 0) {
                            board[y][x] = currentPiece.color;
                        }
                    }
                });
            });
        }
        
        function clearLines() {
            let linesCleared = 0;
            
            for (let r = ROWS - 1; r >= 0; r--) {
                if (board[r].every(cell => cell !== 0)) {
                    board.splice(r, 1);
                    board.unshift(Array(COLS).fill(0));
                    linesCleared++;
                    r++;
                }
            }
            
            if (linesCleared > 0) {
                lines += linesCleared;
                score += [0, 100, 300, 500, 800][linesCleared] * level;
                level = Math.floor(lines / 10) + 1;
                updateDisplay();
            }
        }
        
        function updateDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lines').textContent = lines;
        }
        
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.strokeStyle = '#1a1a1a';
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * BLOCK_SIZE, 0);
                ctx.lineTo(i * BLOCK_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * BLOCK_SIZE);
                ctx.lineTo(canvas.width, i * BLOCK_SIZE);
                ctx.stroke();
            }
            
            // Draw board
            board.forEach((row, r) => {
                row.forEach((cell, c) => {
                    if (cell) {
                        ctx.fillStyle = cell;
                        ctx.fillRect(c * BLOCK_SIZE, r * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                        
                        // Highlight
                        ctx.fillStyle = 'rgba(255,255,255,0.3)';
                        ctx.fillRect(c * BLOCK_SIZE, r * BLOCK_SIZE, BLOCK_SIZE - 1, 5);
                    }
                });
            });
            
            // Draw current piece
            if (currentPiece) {
                ctx.fillStyle = currentPiece.color;
                currentPiece.shape.forEach((row, r) => {
                    row.forEach((cell, c) => {
                        if (cell) {
                            const x = (currentPiece.x + c) * BLOCK_SIZE;
                            const y = (currentPiece.y + r) * BLOCK_SIZE;
                            ctx.fillRect(x, y, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                            
                            ctx.fillStyle = 'rgba(255,255,255,0.3)';
                            ctx.fillRect(x, y, BLOCK_SIZE - 1, 5);
                            ctx.fillStyle = currentPiece.color;
                        }
                    });
                });
            }
        }
        
        function drop() {
            if (gameOver || paused) return;
            
            if (!collision(currentPiece.shape, currentPiece.x, currentPiece.y + 1)) {
                currentPiece.y++;
            } else {
                mergePiece();
                clearLines();
                newPiece();
            }
            draw();
        }
        
        function move(dir) {
            if (gameOver || paused) return;
            
            if (!collision(currentPiece.shape, currentPiece.x + dir, currentPiece.y)) {
                currentPiece.x += dir;
                draw();
            }
        }
        
        function rotate() {
            if (gameOver || paused) return;
            
            const rotated = currentPiece.rotate();
            if (!collision(rotated, currentPiece.x, currentPiece.y)) {
                currentPiece.shape = rotated;
                draw();
            }
        }
        
        function hardDrop() {
            if (gameOver || paused) return;
            
            while (!collision(currentPiece.shape, currentPiece.x, currentPiece.y + 1)) {
                currentPiece.y++;
                score += 2;
            }
            mergePiece();
            clearLines();
            newPiece();
            updateDisplay();
            draw();
        }
        
        function softDrop() {
            if (gameOver || paused) return;
            
            if (!collision(currentPiece.shape, currentPiece.x, currentPiece.y + 1)) {
                currentPiece.y++;
                score += 1;
                updateDisplay();
                draw();
            } else {
                mergePiece();
                clearLines();
                newPiece();
                draw();
            }
        }
        
        function togglePause() {
            if (gameOver) return;
            paused = !paused;
            if (paused) {
                clearInterval(gameLoop);
            } else {
                gameLoop = setInterval(drop, 1000 / level);
            }
        }
        
        function startGame() {
            createBoard();
            score = 0;
            level = 1;
            lines = 0;
            gameOver = false;
            paused = false;
            isHighScore = false;
            updateDisplay();
            document.getElementById('gameOver').style.display = 'none';
            
            newPiece();
            draw();
            
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(drop, 1000 / level);
        }
        
        // Leaderboard Functions
        function getLeaderboard() {
            try {
                const data = localStorage.getItem(LEADERBOARD_KEY);
                return data ? JSON.parse(data) : [];
            } catch (e) {
                return [];
            }
        }
        
        function saveLeaderboard(leaderboard) {
            try {
                localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(leaderboard));
            } catch (e) {
                console.error('Could not save leaderboard:', e);
            }
        }
        
        function renderLeaderboard() {
            const leaderboard = getLeaderboard();
            const list = document.getElementById('leaderboardList');
            
            if (leaderboard.length === 0) {
                list.innerHTML = '<li class="leaderboard-empty">No scores yet!<br>Be the first to play!</li>';
                return;
            }
            
            list.innerHTML = leaderboard.map((entry, index) => {
                const rankClass = index < 3 ? `top-${index + 1}` : '';
                const rankEmoji = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `${index + 1}.`;
                return `
                    <li class="leaderboard-item ${rankClass}">
                        <span class="leaderboard-rank">${rankEmoji}</span>
                        <span class="leaderboard-name">${escapeHtml(entry.name)}</span>
                        <span class="leaderboard-score">${entry.score.toLocaleString()}</span>
                    </li>
                `;
            }).join('');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function saveScore() {
            const nameInput = document.getElementById('playerName');
            let name = nameInput.value.trim();
            
            if (!name) {
                name = 'Anonymous';
            }
            
            const leaderboard = getLeaderboard();
            leaderboard.push({
                name: name,
                score: score,
                date: new Date().toISOString()
            });
            
            // Sort by score (descending) and keep top 10
            leaderboard.sort((a, b) => b.score - a.score);
            if (leaderboard.length > MAX_LEADERBOARD_ENTRIES) {
                leaderboard.length = MAX_LEADERBOARD_ENTRIES;
            }
            
            saveLeaderboard(leaderboard);
            renderLeaderboard();
            
            // Show saved message
            document.getElementById('nameInputContainer').style.display = 'none';
            document.getElementById('savedMessage').style.display = 'block';
            document.getElementById('tryAgainBtn').textContent = 'Try Again';
        }
        
        // Keyboard Controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && gameOver && isHighScore && document.getElementById('nameInputContainer').style.display !== 'none') {
                saveScore();
                return;
            }
            
            switch(e.key) {
                case 'ArrowLeft': move(-1); break;
                case 'ArrowRight': move(1); break;
                case 'ArrowDown': 
                    softDrop();
                    break;
                case 'ArrowUp': rotate(); break;
                case ' ': hardDrop(); break;
                case 'p': case 'P': togglePause(); break;
            }
        });
        
        // Touch Button Controls
        document.querySelectorAll('.touch-btn').forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const action = btn.dataset.action;
                handleTouchAction(action);
                btn.style.transform = 'scale(0.9)';
            }, { passive: false });
            
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                btn.style.transform = 'scale(1)';
            });
            
            btn.addEventListener('mousedown', (e) => {
                const action = btn.dataset.action;
                handleTouchAction(action);
            });
        });
        
        function handleTouchAction(action) {
            switch(action) {
                case 'left': move(-1); break;
                case 'right': move(1); break;
                case 'rotate': rotate(); break;
                case 'drop': hardDrop(); break;
                case 'softdrop': softDrop(); break;
                case 'pause': togglePause(); break;
            }
        }
        
        // Swipe Controls on Canvas
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            touchStartTime = Date.now();
        }, { passive: true });
        
        canvas.addEventListener('touchend', (e) => {
            if (!touchStartX || !touchStartY) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const touchDuration = Date.now() - touchStartTime;
            
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;
            
            // Tap to rotate
            if (touchDuration < TAP_THRESHOLD && 
                Math.abs(diffX) < SWIPE_THRESHOLD && 
                Math.abs(diffY) < SWIPE_THRESHOLD) {
                rotate();
            }
            // Horizontal swipe
            else if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > SWIPE_THRESHOLD) {
                if (diffX > 0) {
                    move(1); // Right
                } else {
                    move(-1); // Left
                }
            }
            // Vertical swipe down
            else if (diffY > SWIPE_THRESHOLD && Math.abs(diffY) > Math.abs(diffX)) {
                softDrop();
            }
            
            touchStartX = 0;
            touchStartY = 0;
        }, { passive: true });
        
        // Prevent scrolling when touching the game
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });
        
        // Initialize
        createBoard();
        draw();
        newPiece();
        renderLeaderboard();
    </script>
</body>
</html>
